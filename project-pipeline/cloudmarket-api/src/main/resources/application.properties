# Nombre de la aplicacion
spring.application.name=cloudmarket-api

# Puerto del servidor
server.port=8080

# Configuracion de la base de datos H2 (archivo persistente)
spring.datasource.url=jdbc:h2:file:/app/data/cloudmarketdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuracion JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Consola H2 (accesible en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
